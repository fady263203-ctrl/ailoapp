function XPBar({pct,primary,accent}){
  const[w,setW]=useState(0);
  useEffect(()=>{const t=setTimeout(()=>setW(pct),400);return()=>clearTimeout(t);},[pct]);
  const col=pct>75?accent:primary;
  return(<div style={{height:7,background:"rgba(128,128,128,0.2)",borderRadius:50,overflow:"hidden"}}><div style={{width:`${w}%`,height:"100%",background:`linear-gradient(90deg,${primary},${col})`,borderRadius:50,transition:"width 1s cubic-bezier(.4,0,.2,1)",boxShadow:w>0?`0 0 10px ${col}88`:undefined}}/></div>);
}

function WeekChart({data,primary}){
  const max=Math.max(...data);
  return(<div style={{display:"flex",alignItems:"flex-end",gap:6,height:60}}>{["أح","إث","ث","أر","خ","ج","س"].map((d,i)=>(<div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><div style={{width:"100%",height:50,display:"flex",alignItems:"flex-end"}}><div style={{width:"100%",height:`${(data[i]/max)*100}%`,background:i===6?`linear-gradient(180deg,${primary},${primary}88)`:`${primary}44`,borderRadius:"3px 3px 0 0",transition:"height 1s ease",minHeight:3}}/></div><span style={{fontSize:9,opacity:0.5}}>{d}</span></div>))}</div>);
}

              <div style={{position:"absolute",inset:-16,borderRadius:"50%",border:`2px solid ${primary}44`,animation:"dot0 1.6s ease-in-out infinite"}}/>
              <div style={{position:"absolute",inset:-28,borderRadius:"50%",border:`2px solid ${primary}22`,animation:"dot0 1.6s ease-in-out infinite",animationDelay:"0.4s"}}/>
            </>}
            <div style={{width:120,height:120,borderRadius:60,overflow:"hidden",border:`3px solid ${callStatus==="connected"?"#22c55e":primary}`,boxShadow:`0 0 30px ${callStatus==="connected"?"#22c55e44":primary+"44"}`,transition:"border-color 0.5s,box-shadow 0.5s"}}>
              {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:80,lineHeight:"120px",display:"block"}}>{partner.av||"🌍"}</span>}
            </div>
          </div>
          <div style={{fontSize:24,fontWeight:800,color:"white",marginBottom:8}}>{partner.name}</div>
          {/* Call status label */}
          {callStatus==="outgoing"
            ? <div style={{color:primary,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <span>{callType==="video"?"📹 مكالمة فيديو صادرة":"🎙️ مكالمة صوتية صادرة"}</span>
              </div>
            : <div style={{color:"#22c55e",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:"#22c55e",animation:"dot0 1.2s ease-in-out infinite"}}/>
                <span>متصل</span>
                {remoteMicOff && <span style={{color:"#ef4444",fontSize:12}}>• كتم الصوت 🔇</span>}
              </div>
          }
          {/* Ringing dots - only when outgoing */}
          {callStatus==="outgoing" && <div style={{marginTop:16,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
            {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:4,background:primary,animationName:`dot${i}`,animationDuration:"1.2s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}
          </div>}
        </div>}
      </div>
      {/* Local video preview */}
      {callType==="video" && <div ref={localVideoElRef} style={{position:"absolute",bottom:120,left:16,width:90,height:120,borderRadius:16,border:`2px solid ${camOn?primary:"#ef4444"}`,overflow:"hidden",boxShadow:`0 0 20px ${glow}`,zIndex:4,background:"#111"}}>
        {!camOn && <div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",color:"#aaa",fontSize:11}}>كاميرا مغلقة</div>}
      </div>}
      {/* Controls */}
      <div style={{padding:"20px 30px 44px",display:"flex",justifyContent:"center",gap:18,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(10px)",zIndex:4}}>
        {[
          {icon:micOn?Ic.mic("white",22):Ic.micOff("white",22), label:micOn?"كتم":"تشغيل", active:micOn, action:toggleMic},
          {icon:Ic.endCall("white",24), label:callStatus==="outgoing"?"إلغاء":"إنهاء", end:true, action:async()=>{
            if(roomRef.current) roomRef.current.send({type:"broadcast",event:"call_end",payload:{}});
            await leaveAgora();
            const supa2=getSupa();
            if(roomRef.current&&supa2){ try{supa2.removeChannel(roomRef.current);}catch(e){} roomRef.current=null; }
            const dur=fmt(callTime);
            if(callStatus==="connected"){
              const entry={id:Date.now(),partner:partner.name,lang:"—",dur,date:new Date().toLocaleDateString("en",{month:"short",day:"numeric"}),type:callType,xp:30};
              setCallHistory(h=>{const nh=[entry,...h.slice(0,19)];save("callhist",nh);return nh;});
              setStats(s=>{const ns={...s,callsTotal:s.callsTotal+1};checkBadges(ns);return ns;});
              updateQuest("calls");
              const today=new Date().toDateString();
              const lastDay=load("last_call_day","");
              if(lastDay!==today){
                const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
                const newStreak=lastDay===yesterday.toDateString()?streak+1:1;
                setStreak(newStreak);save("streak",newStreak);save("last_call_day",today);
              }
              addXp(30,"مكالمة"); setCoins(c=>c+10);
            }
            setMicOn(true); setCamOn(true); setRemoteMicOff(false); setRemoteCamOff(false);
            setCallStatus("idle");
            setScreen("home");
          }},
          ...(callType==="video"?[
            {icon:camOn?Ic.video("white",22):Ic.video("#ef4444",22), label:camOn?"كاميرا":"مغلق", active:camOn, action:toggleCam},
            {icon:Ic.flip("white",18), label:"تبديل", active:true, action:async()=>{
              if(!localVideoRef.current || !agoraRef.current) return;
              const newFront = !frontCam;
              setFrontCam(newFront);
              try{
                const client = agoraRef.current;
                // Stop and close old video track
                await client.unpublish([localVideoRef.current]);
                localVideoRef.current.stop();
                await localVideoRef.current.close();
                localVideoRef.current = null;
                // Create new track with opposite facingMode
                const newVideo = await window.AgoraRTC.createCameraVideoTrack({
                  encoderConfig: "480p_1",
                  facingMode: newFront ? "user" : "environment"
                });
                localVideoRef.current = newVideo;
                await client.publish([newVideo]);
                // Re-play local preview
                if(localVideoElRef.current) newVideo.play(localVideoElRef.current);
              }catch(e){ console.error("flipCam:",e); }
            }},
          ]:[]),
        ].map((b,i)=>(
          <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
            <button onClick={b.action} style={{width:b.end?62:52,height:b.end?62:52,borderRadius:b.end?31:26,background:b.end?"linear-gradient(135deg,#ef4444,#dc2626)":b.active?`${primary}55`:"rgba(239,68,68,0.8)",border:`1px solid ${b.end?"transparent":b.active?primary:"transparent"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:b.end?"0 4px 20px rgba(239,68,68,0.5)":undefined}}>{b.icon}</button>
            <span style={{color:"#aaa",fontSize:10}}>{b.label}</span>
          </div>
        ))}
      </div>
      <style>{CSS}</style>
    </div>
  );

  // ── CHAT — النظام الجديد الخارق ─────────────────────────────────────────────
  // لم نعد نستخدم screen==="chat" — المحادثة أصبحت في تاب Messages

  // ── MAIN ──────────────────────────────────────────────────────────────────
  const TABS=[
    {id:"home",     label:"الرئيسية", icon:Ic.home},
    {id:"messages", label:"الرسائل",  icon:Ic.chat},
    {id:"exercises",label:"تدريبات",  icon:Ic.star},
    {id:"leaderboard",label:"الصدارة",icon:Ic.trophy},
    {id:"history",  label:"السجل",    icon:Ic.clock},
  ];

  return(
    <div style={{background:bg,minHeight:"100vh",color:text,fontFamily:"'Tajawal',system-ui",maxWidth:480,margin:"0 auto",paddingBottom:72,position:"relative",overflow:"hidden"}}>
      <div style={{position:"fixed",top:-100,right:-100,width:280,height:280,borderRadius:"50%",background:glow,filter:"blur(80px)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:-100,left:-100,width:250,height:250,borderRadius:"50%",background:`${accent}18`,filter:"blur(80px)",pointerEvents:"none",zIndex:0}}/>

      {xpPopup&&<div style={{position:"fixed",top:88,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${primary},${secondary})`,color:"white",padding:"7px 18px",borderRadius:50,fontWeight:700,fontSize:13,zIndex:500,animation:"fadeUp 0.4s ease",pointerEvents:"none",boxShadow:`0 4px 18px ${glow}`,display:"flex",alignItems:"center",gap:6,whiteSpace:"nowrap"}}>{Ic.zap("white",13)} +{xpPopup.amt} XP · {xpPopup.label}</div>}

      {/* HEADER */}
      <div style={{background:card,backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:`1px solid ${border}`,padding:"12px 16px",position:"sticky",top:0,zIndex:50,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <button onClick={()=>setShowProfileView(true)} style={{background:"none",border:"none",cursor:"pointer",padding:0}}><Av src={profile.avatar} size={40}/></button>
          <div style={{fontWeight:900,fontSize:22,color:primary,letterSpacing:1}}>✦ Ailo</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button onClick={()=>setDarkMode(d=>!d)} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:"7px 8px",display:"flex",alignItems:"center",gap:4}}>
              {darkMode?Ic.sun(primary,16):Ic.moon(primary,16)}
            </button>
            <button onClick={()=>{setShowNotif(p=>!p);}} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex",position:"relative"}}>
              {Ic.bell(primary,17)}
              {unreadCount>0&&<div style={{position:"absolute",top:3,right:3,minWidth:16,height:16,borderRadius:8,background:"#ef4444",color:"white",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",padding:"0 3px",boxShadow:"0 0 5px #ef4444"}}>{unreadCount>9?"9+":unreadCount}</div>}
            </button>
            <button onClick={()=>setShowSettings(true)} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>{Ic.cog(primary,17)}</button>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:`linear-gradient(135deg,${primary},${secondary})`,color:"white",borderRadius:50,padding:"2px 10px",fontSize:11,fontWeight:800,flexShrink:0,boxShadow:`0 2px 10px ${glow}`}}>Lv.{lvl.level}</div>
          <div style={{flex:1}}><XPBar pct={lvl.pct} primary={primary} accent={accent}/></div>
          <span style={{fontSize:10,color:muted,flexShrink:0}}>{lvl.current}/{lvl.needed}</span>
          <button onClick={()=>setShowCoinsInfo(true)} style={{background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:50,padding:"2px 8px",display:"flex",alignItems:"center",gap:3,flexShrink:0,cursor:"pointer"}}><span style={{fontSize:12}}>🪙</span><span style={{fontSize:11,fontWeight:700,color:"#f59e0b"}}>{coins}</span></button>
          <div style={{background:"rgba(239,68,68,0.15)",borderRadius:50,padding:"2px 8px",fontSize:11,fontWeight:700,color:"#ef4444",flexShrink:0}} style={{display:"flex",alignItems:"center",gap:3}}><span style={{color:"#ef4444",fontSize:13}}>🔥</span><span>{streak}</span></div>
        </div>
      </div>

      {/* NOTIF PANEL */}
      {showNotif&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",backdropFilter:"blur(4px)",zIndex:100}} onClick={()=>setShowNotif(false)}>
          <div style={{...glass({margin:"68px 14px 0",borderRadius:20,padding:0,overflow:"hidden",maxHeight:"75vh",display:"flex",flexDirection:"column"})}} onClick={e=>e.stopPropagation()}>
            {/* Header */}
            <div style={{padding:"14px 16px",borderBottom:`1px solid ${border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:8}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:28,height:28,borderRadius:14,background:"#6366f133",border:"1px solid #6366f144"}}><svg width="14" height="14" viewBox="0 0 24 24" fill="#6366f133" stroke="#818cf8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg></span>الإشعارات</span>
                {unreadCount>0&&<div style={{background:"#ef4444",color:"white",borderRadius:50,padding:"1px 7px",fontSize:11,fontWeight:700}}>{unreadCount}</div>}
              </div>
              <div style={{display:"flex",gap:8}}>
                {unreadCount>0&&<button onClick={markAllRead} style={{background:`${primary}18`,border:`1px solid ${border}`,borderRadius:50,padding:"3px 10px",fontSize:11,cursor:"pointer",color:primary,fontFamily:"'Tajawal',system-ui"}}>قراءة الكل</button>}
                {notifications.length>0&&<button onClick={()=>setNotifications([])} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:50,padding:"3px 10px",fontSize:11,cursor:"pointer",color:"#ef4444",fontFamily:"'Tajawal',system-ui"}}>مسح الكل</button>}
              </div>
            </div>
            {/* List */}
            <div style={{overflowY:"auto",flex:1}}>
              {notifications.length===0?(
                <div style={{textAlign:"center",padding:"40px 20px",color:muted}}>
                  <div style={{fontSize:40,marginBottom:10}}>🔕</div>
                  <div style={{fontSize:13}}>لا توجد إشعارات</div>
                </div>
              ):notifications.map((n,i)=>{
                const typeColor={info:primary,match:"#10b981",msg:"#6366f1",call:"#f59e0b",badge:"#f472b6",quest:"#22c55e",levelup:"#8b5cf6"}[n.type]||primary;
                return(
                  <div key={n.id} onClick={()=>setNotifications(prev=>prev.map(x=>x.id===n.id?{...x,read:true}:x))} style={{display:"flex",alignItems:"flex-start",gap:12,padding:"12px 16px",borderBottom:i<notifications.length-1?`1px solid ${border}`:"none",background:n.read?"transparent":`${typeColor}08`,cursor:"pointer",transition:"background 0.2s"}}>
                    <div style={{width:38,height:38,borderRadius:19,background:`${typeColor}20`,border:`1px solid ${typeColor}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{n.icon}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:6,marginBottom:2}}>
                        <span style={{fontWeight:700,fontSize:13,color:n.read?text:typeColor}}>{n.title}</span>
                        <span style={{fontSize:10,color:muted,flexShrink:0}}>{n.time}</span>
                      </div>
                      <div style={{fontSize:12,color:muted,lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.body}</div>
                    </div>
                    {!n.read&&<div style={{width:8,height:8,borderRadius:4,background:typeColor,flexShrink:0,marginTop:4}}/>}
                    <button onClick={e=>{e.stopPropagation();deleteNotif(n.id);}} style={{background:"none",border:"none",cursor:"pointer",color:muted,fontSize:16,padding:"0 2px",flexShrink:0,lineHeight:1}}>×</button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      <div style={{padding:14,position:"relative",zIndex:1}}>

        {/* HOME */}
        {tab==="home"&&<div style={{animation:"slideIn 0.4s ease"}}>
          <div style={{...glass({marginBottom:14,padding:20,background:`linear-gradient(135deg,${primary}22,${accent}11)`})}}>
            <div style={{display:"flex",alignItems:"center",gap:14}}>
              <Av src={profile.avatar} size={56}/>
              <div style={{flex:1}}><div style={{fontWeight:800,fontSize:17}}>{profile.name}</div><div style={{color:muted,fontSize:12,marginTop:2}}>{profile.status}</div><div style={{display:"flex",gap:6,marginTop:6}}><div style={tag(primary)}>{profile.lang}</div><div style={tag("#22c55e")}>Lv.{lvl.level}</div></div></div>
            </div>
          </div>
          <div style={{...glass({marginBottom:14})}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontWeight:800,fontSize:14,display:"flex",alignItems:"center",gap:6}}>{Ic.zap(primary,15)}<span>المهام اليومية</span></div><div style={{...tag("#f59e0b"),display:"flex",alignItems:"center",gap:4}}><svg width="11" height="11" viewBox="0 0 24 24" fill="#f59e0b22" stroke="#f59e0b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>مكافآت</div></div>
            {quests.map((q,qi)=>(<div key={q.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:11}}><span style={{fontSize:19}}>{q.icon}</span><div style={{flex:1}}><div style={{fontSize:13,color:q.claimed?"#22c55e":q.done?text:text,textDecoration:q.claimed?"line-through":"none"}}>{q.text}</div><div style={{height:4,background:"rgba(128,128,128,0.2)",borderRadius:2,marginTop:4}}><div style={{width:`${(q.progress/q.total)*100}%`,height:"100%",background:q.claimed||q.done?`linear-gradient(90deg,#22c55e,#4ade80)`:`linear-gradient(90deg,${primary},${secondary})`,borderRadius:2,transition:"width 0.8s"}}/></div></div>
              {q.claimed?<div style={tag("#22c55e")}>✅ تم</div>:q.done?<button onClick={()=>{ setQuests(qs=>{ const nqs=qs.map((x,i)=>i===qi?{...x,claimed:true}:x); saveQuests(nqs); return nqs; }); addXp(q.xp,"مهمة"); setCoins(c=>c+10); }} style={{...tag("#f59e0b"),cursor:"pointer",border:"none",fontFamily:"'Tajawal',system-ui"}}>استلام +{q.xp}XP</button>:<div style={tag("#f59e0b")}>+{q.xp}XP</div>}
            </div>))}
          </div>
          <div style={{fontWeight:800,fontSize:13,color:muted,marginBottom:10}}>ابدأ محادثة</div>
          {[
            {type:"video", title:"مكالمة فيديو", desc:"تحدث وجهاً لوجه", grad:`linear-gradient(135deg,${primary}33,${secondary}22)`, color:primary,
              svg:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>},
            {type:"voice", title:"مكالمة صوتية", desc:"حسّن نطقك", grad:`linear-gradient(135deg,#22c55e33,#4ade8022)`, color:"#22c55e",
              svg:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 015 12a19.79 19.79 0 01-3.07-8.67A2 2 0 013.92 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>},
            {type:"text",  title:"دردشة نصية",   desc:"تبادل الرسائل",  grad:`linear-gradient(135deg,#f59e0b33,#fbbf2422)`, color:"#f59e0b",
              svg:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>},
          ].map(c2=>(
            <button key={c2.type} onClick={()=>startSearch(c2.type)} style={{width:"100%",background:c2.grad,backdropFilter:"blur(10px)",border:`1px solid ${border}`,borderRadius:18,padding:14,display:"flex",alignItems:"center",gap:14,cursor:"pointer",marginBottom:10,textAlign:"right"}}>
              <div style={{width:50,height:50,borderRadius:25,background:`${c2.color}22`,border:`1.5px solid ${c2.color}55`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:c2.color,boxShadow:`0 4px 14px ${c2.color}33`}}>{c2.svg}</div>
              <div style={{flex:1}}><div style={{fontWeight:700,fontSize:14,color:text}}>{c2.title}</div><div style={{color:muted,fontSize:12,marginTop:2}}>{c2.desc}</div></div>
            </button>
          ))}

          <div style={{...glass({marginTop:12})}}>
            <div style={{fontWeight:800,fontSize:13,marginBottom:12,color:muted}} style={{display:"flex",alignItems:"center",gap:6}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:13,background:"#f472b633",border:"1px solid #f472b644"}}><svg width="13" height="13" viewBox="0 0 24 24" fill="#f472b622" stroke="#f472b6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg></span>شاراتي</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>{BADGE_DEFS.map((b,i)=>{
              const earned=load("badges_earned",[]).includes(b.key)||b.cond({...stats,streak});
              return(<div key={i} style={{textAlign:"center",padding:"11px 6px",background:earned?`${primary}18`:"rgba(128,128,128,0.08)",borderRadius:14,border:`1px solid ${earned?primary:border}`,opacity:earned?1:0.4,boxShadow:earned?`0 0 14px ${glow}`:undefined}}>
                <div style={{fontSize:24}}>{b.icon}</div>
                <div style={{fontSize:10,fontWeight:700,marginTop:4,color:earned?primary:muted}}>{b.name}</div>
              </div>);
            })}</div>
          </div>
        </div>}

        {/* MESSAGES TAB — النظام الجديد */}
        {tab==="messages"&&<div style={{animation:"slideIn 0.4s ease"}}>

          {/* ── قائمة المحادثات ── */}
          {activeChat===null&&<>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{fontWeight:800,fontSize:16}}>الرسائل</div>
              <button onClick={()=>setShowMsgSearch(s=>!s)} style={{width:36,height:36,borderRadius:18,background:`${primary}18`,border:`1px solid ${border}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={primary} strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </button>
            </div>

            {showMsgSearch&&<div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
              <div style={{flex:1,display:"flex",alignItems:"center",background:"rgba(128,128,128,0.1)",borderRadius:12,border:`1px solid ${border}`,overflow:"hidden"}}>
                <input autoFocus value={searchQuery} onChange={e=>setSearchQuery(e.target.value.toUpperCase())}
                  onKeyDown={e=>{if(e.key==="Enter"){setShowMsgSearch(false);setSearchResult(null);setSearchError("");setShowUserSearch(true);}}}
                  placeholder="ابحث بـ ID — مثال: AIL-F"
                  style={{...inp,flex:1,background:"transparent",border:"none",outline:"none",fontSize:13,letterSpacing:1}}/>
                <button onMouseDown={e=>e.preventDefault()}
                  onClick={()=>{setShowMsgSearch(false);setSearchResult(null);setSearchError("");setShowUserSearch(true);}}
                  style={{background:"none",border:"none",padding:"0 12px",cursor:"pointer",color:primary,fontWeight:700,fontSize:13,fontFamily:"'Tajawal',system-ui",flexShrink:0}}>بحث</button>
              </div>
            </div>}

            {/* Ailo AI */}
            <div onClick={()=>setActiveChat("bot")} style={{...glass({display:"flex",alignItems:"center",gap:12,padding:"12px 14px",marginBottom:8,cursor:"pointer",border:`1px solid ${primary}33`,background:`${primary}08`})}}>
              <div style={{width:48,height:48,borderRadius:24,background:`linear-gradient(135deg,${primary},${secondary})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 12px ${glow}`}}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              </div>
              <div style={{flex:1,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontWeight:800,fontSize:14,color:primary}}>✨ Ailo AI</div>
                  <div style={{fontSize:10,color:muted}}>{botMsgs[botMsgs.length-1]?.time||""}</div>
                </div>
                <div style={{color:muted,fontSize:12,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{(botMsgs[botMsgs.length-1]?.text||"مرحباً! أنا هنا 😊").slice(0,45)}</div>
              </div>
            </div>

            {/* طلبات الدردشة الواردة */}
            {chatRequests.length>0&&<>
              <div style={{color:muted,fontSize:11,fontWeight:700,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
                <span>طلبات جديدة</span>
                <span style={{background:"#ef4444",color:"white",borderRadius:50,padding:"1px 7px",fontSize:10,fontWeight:700}}>{chatRequests.length}</span>
              </div>
              {chatRequests.map((req,i)=>(
                <div key={i} style={{...glass({display:"flex",alignItems:"center",gap:10,padding:"12px 14px",marginBottom:8,border:`1px solid ${primary}33`})}}>
                  <div style={{width:44,height:44,borderRadius:22,overflow:"hidden",flexShrink:0,border:`2px solid ${primary}`}}>
                    {req.from?.av?.startsWith("http")?<img src={req.from.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:26,lineHeight:"44px",display:"block",textAlign:"center"}}>{req.from?.av||"🌍"}</span>}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13}}>{req.from?.name||"مستخدم"}</div>
                    <div style={{color:muted,fontSize:11,marginTop:2}}>يريد محادثتك 💬</div>
                  </div>
                  <button onClick={async()=>{
                    await openChat(req.from?.userId, req.from?.name, req.from?.av);
                    setChatRequests(prev=>{const u=prev.filter((_,j)=>j!==i);save("chat_requests",u);return u;});
                  }} style={{width:36,height:36,borderRadius:18,background:"rgba(34,197,94,0.15)",border:"1px solid rgba(34,197,94,0.3)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#22c55e"}}>✓</button>
                  <button onClick={()=>{
                    setChatRequests(prev=>{const u=prev.filter((_,j)=>j!==i);save("chat_requests",u);return u;});
                  }} style={{width:36,height:36,borderRadius:18,background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",color:"#ef4444"}}>✕</button>
                </div>
              ))}
            </>}

            {/* قائمة المحادثات */}
            <div style={{color:muted,fontSize:11,fontWeight:700,marginBottom:8,marginTop:4}}>المحادثات</div>
            {conversations.length>0
              ? conversations.map((conv,i)=>{
                  const isOnline = onlineUsers[conv.partner_id];
                  const timeStr = conv.last_time ? new Date(conv.last_time).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"}) : "";
                  return(
                    <div key={conv.conv_id||i} onClick={()=>openChat(conv.partner_id,conv.partner_name,conv.partner_av)}
                      style={{...glass({display:"flex",alignItems:"center",gap:12,padding:"12px 14px",cursor:"pointer",marginBottom:8})}}>
                      <div style={{position:"relative",flexShrink:0}}>
                        <div style={{width:48,height:48,borderRadius:24,overflow:"hidden",border:`2px solid ${conv.unread>0?primary:border}`}}>
                          {conv.partner_av?.startsWith("http")?<img src={conv.partner_av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:28,lineHeight:"48px",display:"block",textAlign:"center"}}>{conv.partner_av||"🌍"}</span>}
                        </div>
                        {isOnline&&<div style={{position:"absolute",bottom:1,right:1,width:11,height:11,borderRadius:6,background:"#22c55e",border:`2px solid ${card}`}}/>}
                      </div>
                      <div style={{flex:1,overflow:"hidden"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div style={{fontWeight:conv.unread>0?800:600,fontSize:14}}>{conv.partner_name||"مستخدم"}</div>
                          <div style={{fontSize:10,color:muted}}>{timeStr}</div>
                        </div>
                        <div style={{color:conv.unread>0?text:muted,fontSize:12,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:conv.unread>0?600:400}}>
                          {(conv.last_msg||"ابدأ المحادثة...").slice(0,42)}
                        </div>
                      </div>
                      {conv.unread>0&&<div style={{background:primary,color:"white",borderRadius:50,padding:"2px 8px",fontSize:10,fontWeight:700,flexShrink:0,boxShadow:`0 2px 8px ${glow}`}}>{conv.unread}</div>}
                    </div>
                  );
                })
              :<div style={{...glass({textAlign:"center",padding:24,color:muted})}}>
                <div style={{fontSize:32,marginBottom:8}}>💬</div>
                <div style={{fontSize:13,marginBottom:12}}>لا توجد محادثات بعد</div>
                <button onClick={()=>{setSearchQuery("");setSearchResult(null);setSearchError("");setShowUserSearch(true);}} style={btnP({fontSize:12,padding:"10px 20px"})}>ابحث عن صديق</button>
              </div>}
          </>}

          {/* ── شاشة Ailo AI ── */}
          {activeChat==="bot"&&<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 200px)"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${border}`}}>
              <button onClick={()=>setActiveChat(null)} style={{background:"none",border:"none",cursor:"pointer",color:muted,display:"flex",alignItems:"center",gap:4,fontFamily:"'Tajawal',system-ui",fontSize:13,flexShrink:0}}>{Ic.back(muted,16)} رجوع</button>
              <div style={{width:32,height:32,borderRadius:16,background:`linear-gradient(135deg,${primary},${secondary})`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              </div>
              <div style={{fontWeight:700,fontSize:14,color:primary}}>Ailo AI ✨</div>
            </div>
            <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,paddingBottom:8}}>
              {botMsgs.map(m=>(<div key={m.id} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",maxWidth:"82%"}}>
                {m.from==="bot"&&<div style={{fontSize:11,marginBottom:3,color:muted}}>Ailo AI</div>}
                <div style={{background:m.from==="me"?`linear-gradient(135deg,${primary},${secondary})`:card,backdropFilter:"blur(10px)",color:m.from==="me"?"white":text,padding:"10px 15px",borderRadius:m.from==="me"?"18px 18px 4px 18px":"18px 18px 18px 4px",fontSize:14,lineHeight:1.7,border:`1px solid ${border}`}}>{m.text}</div>
              </div>))}
              {botTyping&&<div style={{alignSelf:"flex-start",background:card,padding:"10px 14px",borderRadius:"18px 18px 18px 4px",display:"flex",gap:5,border:`1px solid ${border}`}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:3.5,background:primary,animationName:`dot${i}`,animationDuration:"1s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}</div>}
              <div ref={botEnd}/>
            </div>
            <div style={{display:"flex",gap:8,paddingTop:8,borderTop:`1px solid ${border}`}}>
              <input value={botInput} onChange={e=>setBotInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&botInput.trim()&&!botTyping){const msg=botInput;setBotMsgs(p=>[...p,{id:Date.now(),from:"me",text:msg,time:now()}]);setBotInput("");sendToGemini(msg);}}} placeholder="اكتب رسالة..." style={{...inp,flex:1}}/>
              <button onClick={()=>{if(!botInput.trim()||botTyping)return;const msg=botInput;setBotMsgs(p=>[...p,{id:Date.now(),from:"me",text:msg,time:now()}]);setBotInput("");sendToGemini(msg);}} style={{width:44,height:44,borderRadius:22,background:`linear-gradient(135deg,${primary},${secondary})`,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:`0 4px 14px ${glow}`}}>{Ic.send("white")}</button>
            </div>
          </div>}

          {/* ── شاشة المحادثة الخارقة ── */}
          {activeChat==="friend"&&(()=>{
            const EMOJIS=["❤️","😂","👍","😮","😢","🔥"];
            const[showEmojiFor,setShowEmojiFor]=useState(null);
            const[isRecordingVoice,setIsRecordingVoice]=useState(false);
            const[recordSecs,setRecordSecs]=useState(0);
            const mediaRecRef=useRef(null);
            const voiceChunksRef=useRef([]);
            const localFileRef=useRef(null);

            useEffect(()=>{
              if(!isRecordingVoice)return;
              const i=setInterval(()=>setRecordSecs(s=>s+1),1000);
              return()=>clearInterval(i);
            },[isRecordingVoice]);

            useEffect(()=>{ msgEnd.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

            const startVoice=async()=>{
              try{
                const stream=await navigator.mediaDevices.getUserMedia({audio:true});
                const mr=new MediaRecorder(stream);
                mediaRecRef.current=mr; voiceChunksRef.current=[];
                mr.ondataavailable=e=>voiceChunksRef.current.push(e.data);
                mr.onstop=async()=>{
                  stream.getTracks().forEach(t=>t.stop());
                  setIsRecordingVoice(false); setRecordSecs(0);
                  if(voiceChunksRef.current.length>0){
                    const blob=new Blob(voiceChunksRef.current,{type:"audio/webm"});
                    const reader=new FileReader();
                    reader.onload=async ev=>{ await sendAudio(ev.target.result); };
                    reader.readAsDataURL(blob);
                  }
                };
                mr.start(); setIsRecordingVoice(true); setRecordSecs(0);
              }catch(e){ alert("تعذر الوصول للميكروفون"); }
            };

            const stopVoice=()=>{ if(mediaRecRef.current?.state==="recording") mediaRecRef.current.stop(); };

            return(
              <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 200px)"}}>
                {/* Header */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,paddingBottom:10,borderBottom:`1px solid ${border}`}}>
                  <button onClick={()=>{setActiveChat(null);setMessages([]);setReplyTo(null);if(msgChannelRef.current){try{getSupa()?.removeChannel(msgChannelRef.current);}catch(e){}msgChannelRef.current=null;}}} style={{background:"none",border:"none",cursor:"pointer",color:muted,display:"flex",alignItems:"center",gap:4,fontFamily:"'Tajawal',system-ui",fontSize:13,flexShrink:0}}>{Ic.back(muted,16)} رجوع</button>
                  <div style={{position:"relative",flexShrink:0}}>
                    <div style={{width:36,height:36,borderRadius:18,overflow:"hidden",border:`2px solid ${primary}`}}>
                      {partner.av?.startsWith("http")?<img src={partner.av} style={{width:"100%",height:"100%",objectFit:"cover"}} alt=""/>:<span style={{fontSize:22,lineHeight:"36px",display:"block",textAlign:"center"}}>{partner.av||"🌍"}</span>}
                    </div>
                    {onlineUsers[partner._uid]&&<div style={{position:"absolute",bottom:0,right:0,width:10,height:10,borderRadius:5,background:"#22c55e",border:`2px solid ${card}`}}/>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:700,fontSize:14}}>{partner.name}</div>
                    <div style={{fontSize:11,color:isTyping?"#22c55e":onlineUsers[partner._uid]?"#22c55e":muted}}>
                      {isTyping?"يكتب الآن...":onlineUsers[partner._uid]?"متصل الآن":"غير متصل"}
                    </div>
                  </div>
                  <button onClick={async()=>{
                    setCallType("voice");setCallStatus("outgoing");setCallTime(0);setScreen("call");
                    const rid="call_"+[userId,partner._uid].sort().join("_");
                    setRoomId(rid); joinRoom(rid);
                    const supa=getSupa();
                    if(supa&&partner._uid){
                      const ib=supa.channel("inbox_"+partner._uid);
                      await ib.subscribe();
                      await ib.send({type:"broadcast",event:"direct_request",payload:{callType:"voice",rid,from:{name:profile.name,av:profile.avatar,userId}}});
                      supa.removeChannel(ib);
                      sendPushNotif(partner._uid,`🎙️ مكالمة من ${profile.name}`,"اضغط للرد","call",{rid,callType:"voice"});
                    }
                    setTimeout(()=>joinAgora(rid.replace(/[^a-zA-Z0-9_]/g,"").slice(0,64),"voice"),300);
                  }} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>{Ic.phone(primary,18)}</button>
                  <button onClick={async()=>{
                    setCallType("video");setCallStatus("outgoing");setCallTime(0);setScreen("call");
                    const rid="call_"+[userId,partner._uid].sort().join("_");
                    setRoomId(rid); joinRoom(rid);
                    const supa=getSupa();
                    if(supa&&partner._uid){
                      const ib=supa.channel("inbox_"+partner._uid);
                      await ib.subscribe();
                      await ib.send({type:"broadcast",event:"direct_request",payload:{callType:"video",rid,from:{name:profile.name,av:profile.avatar,userId}}});
                      supa.removeChannel(ib);
                      sendPushNotif(partner._uid,`📹 مكالمة فيديو من ${profile.name}`,"اضغط للرد","video",{rid,callType:"video"});
                    }
                    setTimeout(()=>joinAgora(rid.replace(/[^a-zA-Z0-9_]/g,"").slice(0,64),"video"),300);
                  }} style={{background:`${primary}22`,border:`1px solid ${border}`,borderRadius:10,cursor:"pointer",padding:8,display:"flex"}}>{Ic.video(primary,18)}</button>
                </div>

                {/* الرسائل */}
                <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:6,paddingBottom:8,position:"relative"}}>
                  <div style={{alignSelf:"center",background:`${primary}18`,border:`1px solid ${border}`,borderRadius:50,padding:"4px 12px",fontSize:10,color:muted,display:"flex",alignItems:"center",gap:4,marginBottom:4}}>{Ic.shield("#22c55e",10)}<span>محادثة مشفرة ومحفوظة</span></div>

                  {messages.map(m=>{
                    const isMe = m.sender_id===userId;
                    const isDeleted = m.type==="deleted";
                    const reactions = msgReactions[m.id]||[];
                    const replyMsg = m.reply_to_id ? messages.find(r=>r.id===m.reply_to_id) : null;
                    const timeStr = m.created_at ? new Date(m.created_at).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit"}) : "";
                    const isRead = !!m.read_at && !isMe;

                    return(
                      <div key={m.id} style={{alignSelf:isMe?"flex-end":"flex-start",maxWidth:"78%",display:"flex",flexDirection:"column",alignItems:isMe?"flex-end":"flex-start"}}>

                        {/* رسالة الرد عليها */}
                        {replyMsg&&<div style={{background:`${primary}18`,border:`1px solid ${border}`,borderRadius:"10px 10px 0 0",padding:"5px 10px",fontSize:11,color:muted,maxWidth:"100%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:-4}}>
                          ↩ {replyMsg.text?.slice(0,30)||"📷 صورة"}
                        </div>}

                        {/* فقاعة الرسالة */}
                        <div
                          onLongPress={()=>{}}
                          onClick={()=>setShowEmojiFor(showEmojiFor===m.id?null:m.id)}
                          style={{
                            background: isDeleted?"rgba(128,128,128,0.15)": isMe?`linear-gradient(135deg,${primary},${secondary})`:card,
                            color: isDeleted?muted: isMe?"white":text,
                            padding: m.type==="image"?"6px": m.type==="audio"?"8px 12px":"10px 14px",
                            borderRadius: isMe?"18px 4px 18px 18px":"4px 18px 18px 18px",
                            fontSize:14, lineHeight:1.6,
                            border:`1px solid ${isMe?"transparent":border}`,
                            boxShadow: isMe?`0 2px 10px ${glow}`:"0 1px 4px rgba(0,0,0,0.08)",
                            cursor:"pointer", fontStyle:isDeleted?"italic":undefined,
                            maxWidth:"100%", overflow:"hidden"
                          }}>
                          {m.type==="image"&&m.image_url&&<img src={m.image_url} style={{maxWidth:220,maxHeight:200,borderRadius:10,display:"block"}} alt=""/>}
                          {m.type==="audio"&&m.audio_url&&<audio controls src={m.audio_url} style={{maxWidth:200,height:34,accentColor:isMe?"white":primary}}/>}
                          {(m.type==="text"||m.type==="deleted"||!m.type)&&<span style={{wordBreak:"break-word"}}>{m.text}</span>}
                        </div>

                        {/* emoji picker */}
                        {showEmojiFor===m.id&&!isDeleted&&<div style={{display:"flex",gap:4,marginTop:4,background:card,border:`1px solid ${border}`,borderRadius:50,padding:"4px 10px",boxShadow:"0 4px 14px rgba(0,0,0,0.15)"}}>
                          {EMOJIS.map(e=>(
                            <button key={e} onClick={()=>{addReaction(m.id,e);setShowEmojiFor(null);}} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",padding:"2px"}}>{e}</button>
                          ))}
                          {isMe&&<button onClick={()=>{deleteMessage(m.id);setShowEmojiFor(null);}} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",padding:"2px 4px",color:"#ef4444"}}>🗑️</button>}
                          <button onClick={()=>{setReplyTo(m);setShowEmojiFor(null);}} style={{background:"none",border:"none",fontSize:14,cursor:"pointer",padding:"2px 4px",color:primary}}>↩</button>
                        </div>}

                        {/* التفاعلات */}
                        {reactions.length>0&&<div style={{display:"flex",gap:2,marginTop:2,flexWrap:"wrap"}}>
                          {Object.entries(reactions.reduce((a,r)=>{a[r.emoji]=(a[r.emoji]||0)+1;return a;},{})).map(([emoji,count])=>(
                            <span key={emoji} onClick={()=>addReaction(m.id,emoji)} style={{background:card,border:`1px solid ${border}`,borderRadius:50,padding:"1px 7px",fontSize:11,cursor:"pointer"}}>{emoji}{count>1&&` ${count}`}</span>
                          ))}
                        </div>}

                        {/* الوقت + علامة القراءة */}
                        <div style={{fontSize:10,color:muted,marginTop:2,display:"flex",alignItems:"center",gap:3}}>
                          {timeStr}
                          {isMe&&(m.read_at?Ic.checks("#22c55e",11):Ic.check(muted,10))}
                        </div>
                      </div>
                    );
                  })}

                  {isTyping&&<div style={{alignSelf:"flex-start",background:card,padding:"10px 14px",borderRadius:"4px 18px 18px 18px",display:"flex",gap:5,border:`1px solid ${border}`}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:3.5,background:primary,animationName:`dot${i}`,animationDuration:"1s",animationIterationCount:"infinite",animationDelay:`${i*0.2}s`}}/>)}</div>}
                  <div ref={msgEnd}/>
                </div>

                {/* شريط الرد */}
                {replyTo&&<div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 12px",background:`${primary}11`,border:`1px solid ${primary}33`,borderRadius:10,marginBottom:4}}>
                  <span style={{fontSize:12,color:primary,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>↩ ردّ على: {replyTo.text?.slice(0,30)||"📷 صورة"}</span>
                  <button onClick={()=>setReplyTo(null)} style={{background:"none",border:"none",cursor:"pointer",color:muted,fontSize:16}}>✕</button>
                </div>}

                {/* شريط التسجيل الصوتي */}
                {isRecordingVoice&&<div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:12,marginBottom:4}}>
                  <div style={{width:8,height:8,borderRadius:4,background:"#ef4444",animation:"dot0 0.8s ease-in-out infinite"}}/>
                  <div style={{flex:1,fontSize:12,color:"#ef4444",fontWeight:700}}>🎙️ تسجيل... {recordSecs}ث</div>
                  <button onClick={stopVoice} style={{background:"#ef4444",border:"none",borderRadius:50,padding:"4px 12px",color:"white",fontSize:12,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>إرسال</button>
                  <button onClick={()=>{if(mediaRecRef.current?.state==="recording"){mediaRecRef.current.stream?.getTracks().forEach(t=>t.stop());mediaRecRef.current.stop();}voiceChunksRef.current=[];setIsRecordingVoice(false);setRecordSecs(0);}} style={{background:"rgba(128,128,128,0.2)",border:"none",borderRadius:50,padding:"4px 10px",color:muted,fontSize:12,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>إلغاء</button>
                </div>}

                {/* شريط الإدخال */}
                <input ref={localFileRef} type="file" accept="image/*" style={{display:"none"}} onChange={async e=>{
                  const f=e.target.files?.[0]; if(!f) return;
                  if(f.size>5*1024*1024){alert("الحد الأقصى 5MB");return;}
                  const reader=new FileReader();
                  reader.onload=(ev)=>{
                    const img2=new Image();
                    img2.onload=async()=>{
                      const canvas=document.createElement("canvas");
                      const max=600; const ratio=Math.min(max/img2.width,max/img2.height,1);
                      canvas.width=img2.width*ratio; canvas.height=img2.height*ratio;
                      canvas.getContext("2d").drawImage(img2,0,0,canvas.width,canvas.height);
                      await sendImage(canvas.toDataURL("image/jpeg",0.7));
                    };

        {/* HISTORY */}
        {tab==="history"&&<div style={{animation:"slideIn 0.4s ease"}}>

              <div style={{fontWeight:800,fontSize:14,color:muted}} style={{display:"flex",alignItems:"center",gap:6}}><span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,borderRadius:13,background:"#f59e0b33",border:"1px solid #f59e0b44"}}><svg width="13" height="13" viewBox="0 0 24 24" fill="#f59e0b22" stroke="#f59e0b" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg></span>المتجر</div>
              <button onClick={()=>setShowCoinsInfo(true)} style={{background:"rgba(245,158,11,0.15)",border:"1px solid rgba(245,158,11,0.3)",borderRadius:50,padding:"4px 12px",fontSize:11,cursor:"pointer",color:"#f59e0b",fontFamily:"'Tajawal',system-ui",display:"flex",alignItems:"center",gap:4,fontWeight:700}}>

            </div>
            {[
              {icon:"❄️",name:"تجميد السلسلة",desc:"احمِ سلسلتك ليوم واحد",price:50,action:()=>{setStreakFrozen(true);save("streakFrozen",true);}},
              {icon:"💎",name:"XP مضاعف",desc:"ضاعف XP لمدة ساعة",price:100,action:()=>{const until=Date.now()+3600000;try{localStorage.setItem("ailo_xp_double_until",until);}catch(e){}setXpDouble(true);setTimeout(()=>setXpDouble(false),3600000);}},

                <button onClick={()=>{ if(coins>=item.price){setCoins(c=>c-item.price);item.action();addXp(5,"شراء"); } }} disabled={coins<item.price} style={{background:coins>=item.price?`linear-gradient(135deg,${primary},${secondary})`:"rgba(128,128,128,0.2)",border:"none",borderRadius:50,padding:"7px 14px",color:"white",fontSize:12,fontWeight:700,cursor:coins>=item.price?"pointer":"not-allowed",fontFamily:"'Tajawal',system-ui",flexShrink:0}}>{item.price} 🪙</button>
              </div>

          {!storeTab&&<>
            {/* ── STEP 1: اختيار اللغة ── */}
            {exStep==="lang"&&<>
              <div style={{fontWeight:800,fontSize:15,marginBottom:14,display:"flex",alignItems:"center",gap:6}}>{Ic.star(primary,16)}<span>اختر اللغة التي تريد تعلمها</span></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>

                    <button key={l.code} onClick={()=>{setExLang(l);setExStep("topic");}} style={{...glass({display:"flex",alignItems:"center",gap:10,padding:"12px 14px",cursor:"pointer",border:`1px solid ${exLang?.code===l.code?primary:border}`,background:exLang?.code===l.code?`${primary}22`:card,textAlign:"right"})}}>
                      <div style={{width:56,height:40,borderRadius:10,overflow:"hidden",flexShrink:0,border:"1px solid rgba(128,128,128,0.2)",boxShadow:"0 2px 8px rgba(0,0,0,0.3)"}}>
                        <img src={l.flag} alt={l.name} style={{width:"100%",height:"100%",objectFit:l.fit||"cover"}}/>
                      </div>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,fontSize:13}}>{l.name}</div>
                        <div style={{display:"flex",gap:6,marginTop:3,flexWrap:"wrap"}}>
                          {prog&&<div style={{color:primary,fontSize:10,display:"flex",alignItems:"center",gap:2}}><svg width="9" height="9" viewBox="0 0 24 24" fill={primary} stroke={primary} strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>{prog.score}نقطة</div>}
                          {(()=>{const due=Object.entries(srsCards).filter(([k,v])=>k.startsWith(`${l.code}_`)&&v.nextReview<=Date.now()).length;return due>0?<div style={{background:"#ef444422",color:"#ef4444",borderRadius:50,padding:"1px 6px",fontSize:9,fontWeight:700}}>{due} للمراجعة</div>:null;})()}
                        </div>
                      </div>
                    </button>

                })}
              </div>
            </>}

            {/* ── STEP 2: اختيار الموضوع ── */}
            {exStep==="topic"&&exLang&&<>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <button onClick={()=>setExStep("lang")} style={{background:"none",border:"none",cursor:"pointer",color:muted,fontSize:13,display:"flex",alignItems:"center",gap:4,fontFamily:"'Tajawal',system-ui"}}>{Ic.back(muted,16)} رجوع</button>
                <div style={{fontWeight:800,fontSize:15,display:"flex",alignItems:"center",gap:8}}><div style={{width:32,height:24,borderRadius:6,overflow:"hidden",flexShrink:0,border:"1px solid rgba(128,128,128,0.2)"}}><img src={exLang.flag} style={{width:"100%",height:"100%",objectFit:exLang.fit||"cover"}}/></div><span>{exLang.name}</span></div>
              </div>
              <div style={{fontWeight:700,fontSize:13,color:muted,marginBottom:12}}>اختر الموضوع:</div>
              {exLoading?(
                <div style={{...glass({textAlign:"center",padding:40})}}>
                  <div style={{fontSize:40,animation:"spin 1s linear infinite",marginBottom:12}}>⟳</div>
                  <div style={{color:muted,fontSize:13}}>دعني أُفكر قليلاً... 🤔</div>
                </div>
              ):(
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {TOPICS.map(t=>(
                    <button key={t.key} onClick={()=>{setExTopic(t);generateExercises(exLang.code,t.name);}} style={{...glass({display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"18px 10px",cursor:"pointer"})}}>
                      {t.svg}
                      <span style={{fontWeight:700,fontSize:12}}>{t.name}</span>
                    </button>
                  ))}
                </div>
              )}
            </>}

            {/* ── STEP 3: الاختبار ── */}
            {exStep==="quiz"&&exQuestions.length>0&&(()=>{
              const q=exQuestions[exIdx];
              const isLast=exIdx===exQuestions.length-1;
              if(!q) return null;

              const goNext=(correct)=>{
                // تحديث SRS للكلمة الحالية
                if(q.word&&exLang&&exTopic){
                  updateSrsCard(exLang.code,exTopic.key,q.word,correct);
                }
                if(correct){
                  setExScore(s=>s+1);
                  addXp(15,"إجابة صحيحة");
                  setStats(s=>{const ns={...s,srsTotal:s.srsTotal+1};checkBadges(ns);return ns;});
                  updateQuest("srs");
                }
                setTimeout(()=>{
                  setExAnswer(null); setExArrWords([]); setExArrSel([]);
                  setExPairSel(null); setExPairDone({}); setExClozeInput(""); setExCardFlipped(false);
                  if(isLast){
                    const newScore=(exScore+(correct?1:0));
                    const lp={...langProgress,[exLang.code]:{score:(langProgress[exLang.code]?.score||0)+newScore,lastTopic:exTopic?.name,date:new Date().toLocaleDateString("ar")}};
                    setLangProgress(lp); saveLangProgress(lp);
                    addNotif("🎓","انتهيت من التمرين!",`أجبت ${newScore} من ${exQuestions.length} بشكل صحيح في ${exLang?.name}`,"quest");
                    const finalScore=exScore+(correct?1:0);
                    // نشر تلقائي في الصدارة
                    pushLB(totalXp);
                    // إذا كان هناك أخطاء → Cool-down أولاً
                    const errors=[...sessionErrors,...(correct?[]:[q.word||""])].filter(Boolean);
                    if(errors.length>0){
                      // ✅ تحويل كل الأخطاء لـ MCQ بسيط بغض النظر عن نوع السؤال الأصلي
                      const allMeanings=exQuestions.filter(eq=>eq.meaning).map(eq=>eq.meaning);
                      const cdQ=exQuestions
                        .filter(eq=>errors.includes(eq.word) && eq.meaning)
                        .slice(0,5)
                        .map(eq=>{
                          const wrongOpts=allMeanings.filter(m=>m!==eq.meaning).sort(()=>Math.random()-0.5).slice(0,3);
                          const options=[eq.meaning,...wrongOpts].sort(()=>Math.random()-0.5);
                          return{type:"mcq",word:eq.word,q:"ترجم هذه الكلمة",options,answer:options.indexOf(eq.meaning)};
                        });
                      if(cdQ.length>0){
                        setCooldownQ(cdQ); setCooldownIdx(0); setCooldownAns(null);
                        setExResult({score:finalScore,total:exQuestions.length,lang:exLang,topic:exTopic});
                        setExStep("cooldown");
                        return;
                      }
                    }
                    // شاشة النجاح
                    setExResult({score:finalScore,total:exQuestions.length,lang:exLang,topic:exTopic});
                    setExStep("result");
                  } else { setExIdx(x=>x+1); }
                },1200);
              };

              return(<>
                {/* Header */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                  <button onClick={()=>{setExStep("topic");setExAnswer(null);setExArrWords([]);setExArrSel([]);setExPairSel(null);setExPairDone({});setExClozeInput("");setExCardFlipped(false);}} style={{background:"none",border:"none",cursor:"pointer",color:muted,fontSize:13,display:"flex",alignItems:"center",gap:4,fontFamily:"'Tajawal',system-ui"}}>{Ic.back(muted,16)} رجوع</button>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:muted,marginBottom:4}}>
                      <span style={{display:"flex",alignItems:"center",gap:4}}>{exLang?.name} — {exTopic?.name}</span>
                      <span>{exIdx+1}/{exQuestions.length}</span>
                    </div>
                    <XPBar pct={Math.round((exScore/exQuestions.length)*100)} primary={primary} accent={accent}/>
                  </div>
                  <div style={{...tag("#22c55e"),display:"flex",alignItems:"center",gap:4}}><svg width="11" height="11" viewBox="0 0 24 24" fill="#22c55e33" stroke="#22c55e" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4a2 2 0 000 4h2M18 9h2a2 2 0 010 4h-2M12 17v4M8 21h8M7 4h10v7a5 5 0 01-10 0V4z"/></svg>{exScore}</div>
                </div>

                <div style={{...glass({padding:"20px 16px",marginBottom:12,background:q.type==="speech"?card:`linear-gradient(135deg,${primary}18,${accent}0a)`})}}>

                  {/* ── MCQ ── */}
                  {(!q.type||q.type==="mcq")&&<>
                    <div style={{color:muted,fontSize:12,marginBottom:8,textAlign:"center"}}>{q.q}</div>
                    <div style={{fontWeight:900,fontSize:30,background:`linear-gradient(135deg,${primary},${accent})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:20,textAlign:"center"}}>{q.word}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      {q.options?.map((o,i)=>{
                        let bg2=card,bc=border,co=text;
                        if(exAnswer!==null){if(i===q.answer){bg2="#22c55e22";bc="#22c55e";co="#22c55e";}else if(i===exAnswer){bg2="#ef444422";bc="#ef4444";co="#ef4444";}}
                        return(<button key={i} onClick={()=>{if(exAnswer!==null)return;setExAnswer(i);goNext(i===q.answer);}} style={{background:bg2,border:`2px solid ${bc}`,borderRadius:13,padding:"13px 9px",fontWeight:700,fontSize:14,cursor:"pointer",color:co,fontFamily:"'Tajawal',system-ui",transition:"all 0.2s",textAlign:"right"}}>{o}</button>);
                      })}
                    </div>
                  </>}

                  {/* ── ARRANGE ── */}
                  {q.type==="arrange"&&(()=>{
                    const maxWords=(q.answer||"").split(" ").filter(Boolean).length;
                    const isFull=exArrSel.length>=maxWords;
                    return(<>
                    <div style={{color:muted,fontSize:12,marginBottom:8,textAlign:"center"}}>{q.q}</div>
                    <div style={{color:muted,fontSize:11,textAlign:"center",marginBottom:10}}>{exArrSel.length} / {maxWords} كلمة</div>
                    <div style={{minHeight:48,background:"rgba(128,128,128,0.1)",borderRadius:12,padding:8,marginBottom:12,display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",border:`1px solid ${isFull?primary:border}`,direction:"ltr",transition:"border-color 0.2s"}}>
                      {(exArrSel.length===0?[]:exArrSel).map((w,i)=>(
                        <button key={i} onClick={()=>{setExArrSel(s=>s.filter((_,j)=>j!==i));setExArrWords(w2=>[...w2,w]);}} style={{background:`linear-gradient(135deg,${primary},${secondary})`,color:"white",border:"none",borderRadius:8,padding:"6px 12px",fontSize:13,cursor:"pointer",fontFamily:"'Tajawal',system-ui"}}>{w}</button>
                      ))}
                      {exArrSel.length===0&&<span style={{color:muted,fontSize:12,lineHeight:"36px"}}>اضغط الكلمات بالترتيب...</span>}
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginBottom:12,direction:"ltr"}}>
                      {(exArrWords.length>0?exArrWords:(q.words||[]).slice().sort(()=>Math.random()-0.5)).map((w,i)=>(
                        <button key={i} onClick={()=>{if(isFull)return;setExArrSel(s=>[...s,w]);setExArrWords(w2=>w2.filter((_,j)=>j!==i));}}
                          style={{background:isFull?"rgba(128,128,128,0.08)":card,border:`1px solid ${isFull?"transparent":border}`,borderRadius:8,padding:"8px 14px",fontSize:13,cursor:isFull?"not-allowed":"pointer",color:isFull?muted:text,fontFamily:"'Tajawal',system-ui",opacity:isFull?0.4:1,transition:"all 0.2s"}}>{w}</button>

                    </div>
                    {exAnswer==="wrong"&&<div style={{color:"#ef4444",fontSize:12,textAlign:"center",marginBottom:8}}>الإجابة الصحيحة: {q.answer}</div>}
                    {exAnswer==="correct"&&<div style={{color:"#22c55e",fontSize:12,textAlign:"center",marginBottom:8}}>✅ ممتاز!</div>}
                    <button onClick={()=>{
                      if(exArrSel.length===0) return;
                      const ok=exArrSel.join(" ")===q.answer;
                      setExAnswer(ok?"correct":"wrong");
                      goNext(ok);
                    }} style={btnP({width:"100%",opacity:exArrSel.length===0?0.5:1})}>تحقق ✓</button>
                    </>);
                  })()}

                  {/* ── CLOZE ── */}
                  {q.type==="cloze"&&<>
                    <div style={{color:muted,fontSize:12,marginBottom:10,textAlign:"center"}}>{q.q}</div>
                    <div style={{fontWeight:700,fontSize:16,color:primary,textAlign:"center",marginBottom:16,padding:"12px",background:`${primary}11`,borderRadius:12,border:`1px solid ${border}`,lineHeight:1.8}}>{q.sentence}</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                      {q.options?.map((o,i)=>{
                        let bg2=card,bc=border,co=text;
                        if(exAnswer!==null){if(i===q.answer){bg2="#22c55e22";bc="#22c55e";co="#22c55e";}else if(i===exAnswer){bg2="#ef444422";bc="#ef4444";co="#ef4444";}}
                        return(<button key={i} onClick={()=>{if(exAnswer!==null)return;setExAnswer(i);goNext(i===q.answer);}} style={{background:bg2,border:`2px solid ${bc}`,borderRadius:13,padding:"13px 9px",fontWeight:700,fontSize:14,cursor:"pointer",color:co,fontFamily:"'Tajawal',system-ui",transition:"all 0.2s"}}>{o}</button>);
